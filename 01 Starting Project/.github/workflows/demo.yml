name: Path Debug

on:
  push:
    branches: [ main ]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show full workspace
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "Repo root:"
          ls -la
          echo ""
          echo "Find package.json anywhere:"
          find . -name package.json