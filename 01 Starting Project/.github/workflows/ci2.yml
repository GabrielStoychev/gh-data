name: CI

on:
  push:
    branches: [ main ]

jobs:
  debug-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo root
        run: |
          echo "PWD:"
          pwd
          echo "ROOT CONTENTS:"
          ls -la

      - name: Find package.json
        run: |
          echo "Searching for package.json:"
          find . -name package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps (ROOT)
        run: npm ci
        continue-on-error: true