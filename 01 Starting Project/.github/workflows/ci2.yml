name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current directory (sanity check)
        run: |
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Debug npm context
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "Files here:"
          ls -la
          echo ""
          echo "package.json:"
          cat package.json
          echo ""
          echo "package-lock.json:"
          cat package-lock.json | head -n 5

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build